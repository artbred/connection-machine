name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -H "X-Project: ${{ github.event.repository.name }}" \
            -d '{}' \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}")

          if [ "$response" != "200" ]; then
            echo "Webhook returned HTTP $response"
            exit 1
          fi

          echo "Deploy triggered successfully"
