services:
  trel:
    build: .
    depends_on:
      - steel
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://steel:3000
      - WS_URL=ws://steel:3000
    volumes:
      - ./session_context.json:/app/session_context.json
    restart: unless-stopped

  steel:
    image: ghcr.io/steel-dev/steel-browser
    ports:
      - "127.0.0.1:9223:9223"
      - "127.0.0.1:3001:3000"
    restart: unless-stopped