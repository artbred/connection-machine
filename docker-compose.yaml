services:
  connection-machine:
    container_name: connection-machine
    build:
      context: .
    env_file:
      - .env
    environment:
      - CHROME_PORT=9225
      - METRICS_ENABLED=${METRICS_ENABLED:-true}
      - METRICS_HOST=${METRICS_HOST:-0.0.0.0}
      - METRICS_PORT=${METRICS_PORT:-9102}
    restart: always
    dns: 1.1.1.1
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "3"
    volumes:
      - ./data:/app/data
